<!DOCTYPE html>
<html>
<head>

<title>Client Portal — Granite Ridge Group</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    background:#fff;
    font-family:monospace;
    margin:0;
    color:#000;
}

.container{
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.content{
    width:90%;
    max-width:500px;
    text-align:center;
}

.logo{
    width:70%;
    max-width:320px;
}

.divider{
    border-top:1px solid #000;
    margin:20px 0;
}

input{
    width:100%;
    padding:8px;
    margin-top:8px;
    margin-bottom:12px;
    border:1px solid #000;
    font-family:monospace;
}

button{
    width:100%;
    padding:8px;
    background:#000;
    color:#fff;
    border:none;
    cursor:pointer;
    font-family:monospace;
}

.links{
    margin-top:10px;
}

.links a{
    color:#000;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}

#error{
    display:none;
    margin-top:15px;
}

nav{
    margin-top:20px;
}

nav a{
    margin:0 10px;
    text-decoration:none;
    color:#000;
}

nav a:hover{
    text-decoration:underline;
}


@media (max-width:600px){

body{
    font-size:14px;
}

nav a{
    display:block;
    margin:10px 0;
}

}
    
</style>

<script>
function handleLogin(event){
    event.preventDefault();
    document.getElementById("error").style.display = "block";
}
</script>

</head>

<body>

<div class="container">

<div class="content">

<img src="logo.png" class="logo"><br>

<b>Client Portal</b>

<div class="divider"></div>

<form onsubmit="handleLogin(event)">

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="links">
<a href="#">Forgot password?</a>
</div>

<div id="error">
Invalid username or password.
</div>

<div class="divider"></div>

<nav>
<a href="index.html">Home</a>
<a href="contact.html">Contact</a>
</nav>

</div>

</div>

</body>
</html>
